name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: "file:local.db"
      AUTH_SECRET: "ci-build-placeholder-secret"
      APP_URL: "http://localhost:3000"
      CRON_SECRET: "ci-build-placeholder"
      BLOB_READ_WRITE_TOKEN: ""
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      EMAIL_FROM: "Pantry <ci@example.com>"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
